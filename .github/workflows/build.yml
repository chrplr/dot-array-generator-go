name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: ''
          - os: linux
            arch: arm64
            suffix: ''
          - os: darwin
            arch: amd64
            suffix: ''
          - os: darwin
            arch: arm64
            suffix: ''
          - os: windows
            arch: amd64
            suffix: '.exe'
          - os: windows
            arch: arm64
            suffix: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -o dot-array-generator-Aulet-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }} ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dot-array-generator-Aulet-${{ matrix.os }}-${{ matrix.arch }}
          path: dot-array-generator-Aulet-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
